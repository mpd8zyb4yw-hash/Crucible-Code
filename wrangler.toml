name = "crucible-proxy"
main = "worker/index.ts"
compatibility_date = "2026-06-20"

# Gives an immediate https://crucible-proxy.<your-subdomain>.workers.dev URL with no
# DNS setup — point the server's PROXY_URL at it to go live right away.
workers_dev = true

# Stable custom domain — the canonical origin for the proxy AND for OAuth callbacks.
# `custom_domain = true` makes `wrangler deploy` auto-provision the DNS record + edge
# cert for proxy.crucible.cam (zone is on this same `wrangler login` account — the tunnel
# lives there). This gives a fixed callback URL you register in the OAuth consoles ONCE.
# The workers.dev URL above still works as a fallback, but login + callbacks use this.
#   PROXY_URL / VITE_PROXY_URL = https://proxy.crucible.cam
[[routes]]
pattern = "proxy.crucible.cam"
custom_domain = true

# Secrets (NOT vars — all sensitive). Set each with:
#   wrangler secret put JWT_SECRET
#   wrangler secret put VITE_GROQ_API_KEY
#   wrangler secret put VITE_OPENROUTER_API_KEY
#   wrangler secret put VITE_GEMINI_API_KEY
#   wrangler secret put VITE_HF_API_KEY
#   wrangler secret put VITE_MISTRAL_API_KEY
#   wrangler secret put CLOUDFLARE_API_KEY
#   wrangler secret put CLOUDFLARE_ACCOUNT_ID
# Optional (only if you use these providers):
#   wrangler secret put TOGETHER_API_KEY
#   wrangler secret put CEREBRAS_API_KEY
#   wrangler secret put COHERE_API_KEY
#   wrangler secret put FIREWORKS_API_KEY
#   wrangler secret put DEEPINFRA_TOKEN
#
# Session B — OAuth login (moves login off Fly):
#   wrangler secret put GOOGLE_CLIENT_ID
#   wrangler secret put GOOGLE_CLIENT_SECRET
#   wrangler secret put GITHUB_CLIENT_ID
#   wrangler secret put GITHUB_CLIENT_SECRET

# Where the browser is sent back to after login (with ?token=<jwt>). Non-secret.
[vars]
FRONTEND_URL = "https://crucible.cam"

# User identities (keyed by provider:providerId). Namespaces created 2026-06-21 (free tier).
# `id` = production binding; `preview_id` = used by `wrangler dev`. Recreate with:
#   wrangler kv namespace create CRUCIBLE_USERS            # -> id
#   wrangler kv namespace create CRUCIBLE_USERS --preview  # -> preview_id
[[kv_namespaces]]
binding = "CRUCIBLE_USERS"
id = "54c5ee1ae4a9446bb6ab5b0a0e617b98"
preview_id = "d7de46b730a245cdaa181de42d02482b"
#
# OAuth callback URLs to register in the provider consoles (point at THIS worker's
# canonical custom-domain origin above — they must match byte-for-byte):
#   Google:  https://proxy.crucible.cam/auth/callback/google
#   GitHub:  https://proxy.crucible.cam/auth/callback/github
